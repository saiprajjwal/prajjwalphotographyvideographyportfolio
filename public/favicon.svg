<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  
  <!-- Camera aperture ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  
  <!-- PP Monogram — clean, elegant, bold -->
  <!-- First P -->
  <text
    x="5"
    y="22"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="17"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-1"
  >PP</text>
  
  <!-- Subtle accent dot — lens aperture -->
  <circle cx="26" cy="7" r="1.5" fill="#ffffff" opacity="0.4"/>
</svg>